name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create env file
        run: echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" > .env


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.config/.android
          keytool -genkeypair \
            -v \
            -keystore ~/.config/.android/debug.keystore \
            -storepass android \
            -alias AndroidDebugKey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Show signing report
        working-directory: android
        run: ./gradlew signingReport
      - name: Show signing report
        working-directory: android
        run: ./gradlew signingReport

      - name: Get signing report
        working-directory: android
        run: ./gradlew signingReport

      - name: Verify Firebase configuration
        working-directory: android
        run: |
          echo "Checking Firebase package and OAuth configuration..."
          grep -n "package_name" app/google-services.json
          grep -n "certificate_hash" app/google-services.json
          grep -n "client_type.*3" app/google-services.json || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build APK
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nourish-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
